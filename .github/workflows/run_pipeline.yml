name: Distressed Investing Pipeline

on:
  schedule:
    - cron: '0 0 * * 0' # 🕰️ Triggers automatically every Sunday at midnight
  workflow_dispatch:   # 🔘 Adds a button in GitHub so you can click and run it manually anytime

jobs:
  run-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Streaming Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install boto3 pandas pyarrow

      - name: Execute High-Performance S3 Stream
        run: |
          python scalable_stream.py

      - name: Commit and Push Parquet Data to GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add scalable_bankruptcy_dockets.parquet
          git commit -m "Automated update: Enriched distressed dockets" || echo "No changes to commit"
          git push
